<section id="caracteristicas" class="bg-white px-4 py-20 lg:px-8 lg:py-28">
  <div class="mx-auto max-w-7xl">
    <!-- Cabecera de sección -->
    <div class="mx-auto max-w-2xl text-center">
      <p class="text-sm font-semibold uppercase tracking-wider text-blue-600">Características</p>
      <h2 class="mt-3 text-3xl font-bold tracking-tight text-gray-900 md:text-4xl">
        Todo lo que necesita tu despacho profesional
      </h2>
      <p class="mt-4 text-lg leading-relaxed text-gray-500">
        Una plataforma completa con todas las herramientas para gestionar documentos,
        comunicaciones, facturación y resolución de disputas.
      </p>
    </div>

    <!-- Grid de features -->
    <div class="mt-16 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <article
        *ngFor="let feature of features"
        class="group rounded-xl border border-gray-200 bg-white p-6 transition-all duration-200 hover:border-blue-300 hover:shadow-md"
      >
        <div class="mb-4 flex h-12 w-12 items-center justify-center rounded-lg bg-blue-50">
          <span class="material-icons text-blue-600">{{ feature.icon }}</span>
        </div>
        <h3 class="text-lg font-semibold text-gray-900">
          {{ feature.title }}
        </h3>
        <p class="mt-2 text-sm leading-relaxed text-gray-500">
          {{ feature.description }}
        </p>
      </article>
    </div>
  </div>
</section>
