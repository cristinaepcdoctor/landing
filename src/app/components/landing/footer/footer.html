<footer class="footer">
  <div class="footer-container">
    <div class="footer-grid">
      <div class="footer-brand">
        <a href="/" class="brand-link" aria-label="LexFolder">
          <img
            src="/logo-lexfolder.png"
            alt="LexFolder logo"
            class="brand-logo"
          />
          <span class="brand-name">LexFolder</span>
        </a>
        <p class="brand-description">
          Plataforma de gestión documental y procedimientos MASC.
        </p>
        <div class="contact-info">
          <span class="contact-item">
            <span class="material-icons icon">phone</span>
            Teléfono: +34 635 64 64 55
          </span>
          <span class="contact-item">
            <span class="material-icons icon">mail</span>
            Email: soporte@lexfolder.es
          </span>
        </div>
        <div class="certifications">
          <img
            src="/conformidad-eidas.png"
            alt="Conformidad EIDAS"
            class="cert-logo"
          />
          <img src="/conformidad-ens.png" alt="Conformidad ENS" class="cert-logo" />
          <img src="/grpd-logo.png" alt="GRPD" class="cert-logo" />
          <img src="/iso27001.png" alt="ISO 27001" class="cert-logo" />
        </div>
      </div>

      <nav class="footer-nav" *ngFor="let section of footerSections" [attr.aria-label]="section.title">
        <h3 class="nav-title">
          {{ section.title }}
        </h3>
        <ul class="nav-list" role="list">
          <li *ngFor="let link of section.links">
            <a
              [href]="link.href"
              target="_blank"
              rel="noopener noreferrer"
              class="nav-link"
            >
              {{ link.label }}
            </a>
          </li>
        </ul>
      </nav>
    </div>

    <div class="footer-bottom">
      <p class="copyright">
        {{ currentYear }} LexFolder. Todos los derechos reservados. Software de gestión para despachos profesionales.
      </p>
    </div>
  </div>
</footer>
