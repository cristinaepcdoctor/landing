<header class="header">
  <nav class="header__nav" aria-label="Navegación principal">
    <a href="/" class="header__logo" aria-label="LexFolder - Inicio">
      <div class="header__logo-icon">
        <img src="/logo-lexfolder.png" alt="LexFolder Logo" class="header__logo-image">
      </div>
      <span class="header__logo-name">LexFolder</span>
    </a>

    <ul class="header__nav-list" role="list">
      @for (link of navLinks; track $index) {
        <li>
          <a [href]="link.href" class="header__nav-link">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <div class="header__actions">
      <a href="https://lexfolder.net/login" target="_blank" rel="noopener noreferrer" class="header__action-link">
        Iniciar sesión
      </a>
      <a href="https://lexfolder.net" target="_blank" rel="noopener noreferrer" class="header__action-button">
        Comenzar ahora
      </a>
    </div>

    <button class="header__mobile-toggle" (click)="toggleMenu()" [attr.aria-expanded]="mobileOpen"
      aria-controls="mobile-menu" [attr.aria-label]="mobileOpen ? 'Cerrar menú' : 'Abrir menú'">
      @if (!mobileOpen) {
        <span class="material-icons">menu</span>
      } 
      @else{
        <span class="material-icons">close</span>
      }
    </button>
  </nav>

  @if (mobileOpen) {
  <div id="mobile-menu" class="header__mobile-menu">
    <ul class="header__mobile-list" role="list">
      @for (link of navLinks; track $index) {
        <li>
          <a [href]="link.href" class="header__mobile-link" (click)="toggleMenu()">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>
    <div class="header__mobile-actions">
      <a href="https://lexfolder.net" target="_blank" rel="noopener noreferrer" class="header__mobile-action-link">
        Iniciar sesión
      </a>
      <a href="https://lexfolder.net" target="_blank" rel="noopener noreferrer" class="header__mobile-action-button">
        Comenzar ahora
      </a>
    </div>
  </div>
  }
</header>
