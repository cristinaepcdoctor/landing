<!doctype html>
<html lang="es">
  <head>
    <!-- Le decimos a google qué es LexFolder, qué hace y cómo categorizarlo -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "LexFolder",
        "description": "Software de gestión integral para despachos de abogados. Gestión documental, videoconferencias, firma electrónica, facturación Veri*Factu y procedimientos MASC.",

        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR",

        },
        "provider": {
          "@type": "Organization",
          "name": "LexFolder",
          "url": "https://lexfolder.net"
        },
        "featureList": [
          "Gestión documental",
          "Videoconferencias seguras",
          "Firma electrónica Click & Sign",
          "Facturación Veri*Factu",
          "Procedimientos MASC",
          "Certificados de envío y apertura"
        ]
      }

    <!--Metadatos para posicionamiento en redes-->
    <meta charset="utf-8" />
