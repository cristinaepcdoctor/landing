  <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Qué es LexFolder y para quién está diseñado?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "LexFolder es un software de gestión integral diseñado específicamente 
              para despachos de abogados, mediadores, árbitros y profesionales del derecho. 
              Permite gestionar expedientes, documentos, comunicaciones, facturación y procedimientos 
              MASC desde una única plataforma online."
            }
          },
          {
            "@type": "Question",
            "name": "¿Necesito instalar algún software para usar LexFolder?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. LexFolder es una plataforma 100% online (SaaS). Solo necesitas un 
              navegador web y conexión a internet. Funciona en cualquier dispositivo: ordenador, 
              tablet o teléfono móvil, sin instalaciones ni actualizaciones manuales."
            }
          },
          {
            "@type": "Question",
            "name": "¿LexFolder cumple con el RGPD y la normativa de protección de datos?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. LexFolder está diseñado con el cumplimiento normativo del RGPD como 
              prioridad. Implementamos cifrado SSL, controles de acceso granulares, copias de 
              seguridad automáticas y todas las medidas técnicas necesarias para proteger los 
              datos personales de tus clientes."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué son los procedimientos MASC y cómo ayuda LexFolder?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "MASC son los Medios Adecuados de Solución de Controversias, que incluyen 
              mediación, arbitraje, conciliación y negociación. LexFolder ofrece herramientas 
              especializadas: plantillas de actas, seguimiento de procesos, comunicación segura 
              entre partes y gestión de plazos."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué es la firma electrónica Click & Sign?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Click & Sign es el sistema de firma electrónica integrado en LexFolder 
              que permite firmar documentos online con plena validez legal desde cualquier dispositivo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué es Veri*Factu y cómo funciona en LexFolder?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Veri*Factu es el sistema de facturación electrónica conforme a la normativa 
              vigente en España. LexFolder incorpora emisión de facturas electrónicas adaptada a los requisitos legales."
            }
          },
          {
            "@type": "Question",
            "name": "¿Los certificados de envío y apertura tienen validez legal?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. LexFolder genera certificados de envío y apertura de comunicaciones con 
              plena validez legal, acreditando la entrega del contenido y la fecha y hora exacta de su lectura."
            }
          }
        ]
      }
